<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App - v1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        main {
            padding: 20px;
            text-align: center;
        }
        footer {
            background-color: #ddd;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 15px;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<header>
    <h1>My App</h1>
    <p>Version 1</p>
</header>

<main>
    <div class="card">
        <h2>Welcome</h2>
        <p>This is Version 1 of your application. Remember this ok</p>
        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </div>
</main>

<footer>
    <p>© 2026 My App</p>
</footer>

<script>
    function showMessage() {
        document.getElementById("message").innerText = "Button clicked!";
    }
</script>

</body>
</html>
