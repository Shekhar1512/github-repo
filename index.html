<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My App - Version 4</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #ffffff;
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(255,255,255,0.05);
}

header h1 {
    margin: 0;
    color: #38bdf8;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: #cbd5f5;
}

nav a:hover {
    color: white;
}

/* Hero */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: linear-gradient(135deg, #1e3a8a, #9333ea);
}

.hero h2 {
    font-size: 36px;
    margin-bottom: 10px;
}

.hero p {
    color: #d1d5db;
}

.hero button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.hero button:hover {
    background: #16a34a;
}

/* Features */
.features {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px 20px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    background: #334155;
}

.card h3 {
    margin-bottom: 10px;
    color: #38bdf8;
}

.card p {
    color: #cbd5e1;
}

/* Footer */
footer {
    text-align: center;
    padding: 15px;
    background: #020617;
    color: #94a3b8;
}

/* Message */
#msg {
    margin-top: 15px;
    color: #4ade80;
}
</style>
</head>

<body>

<header>
    <h1>My App</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Welcome to Version 4</h2>
    <p>Modern UI with a clean and professional design.</p>
    <button onclick="showMsg()">Try Feature</button>
    <p id="msg"></p>
</section>

<section class="features">
    <div class="card">
        <h3>Fast</h3>
        <p>Optimized performance and lightweight design.</p>
    </div>

    <div class="card">
        <h3>Modern</h3>
        <p>Clean UI with latest design trends.</p>
    </div>

    <div class="card">
        <h3>Scalable</h3>
        <p>Ready to grow into a full application.</p>
    </div>
</section>

<footer>
    <p>© 2026 My App | Version 4</p>
</footer>

<script>
function showMsg() {
    document.getElementById("msg").innerText =
    "Version 4 is running successfully!";
}
</script>

</body>
</html>
