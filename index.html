<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App - Q2 Version 2</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
        }

        header {
            text-align: center;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #cfd8dc;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .card h2 {
            margin-bottom: 10px;
        }

        .version-tag {
            display: inline-block;
            background: #00e676;
            color: #003300;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: #ff9800;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #fb8c00;
            transform: scale(1.05);
        }

        #message {
            margin-top: 15px;
            font-size: 14px;
            color: #b2ff59;
        }

        footer {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 13px;
        }
    </style>
</head>

<body>

<header>
    <h1>My App</h1>
    <p>Q2 - Version 2</p>
</header>

<main>
    <div class="card">
        <div class="version-tag">v2</div>
        <h2>Dashboard</h2>
        <p>This is your upgraded Version 2 interface.</p>

        <button onclick="showMessage()">Check Version</button>
        <p id="message"></p>
    </div>
</main>

<footer>
    <p>© 2026 My App | Q2 Release v2</p>
</footer>

<script>
    function showMessage() {
        document.getElementById("message").innerText =
        "You are running Q2 Version 2 successfully!";
    }
</script>

</body>
</html>
